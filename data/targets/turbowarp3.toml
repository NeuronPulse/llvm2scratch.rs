[info]
name = "TurboWarp"
url = "https://turbowarp.org"
desc = """\
A mod of Scratch 3.0 with improved performance and other features. Compiles \
scratch into javascript. Accurately runs scratch code with a few different \
behaviours, namely a limited max recursion depth.\
"""
formats = ["project3", "sprite3"]

[exec]
# Using a jump table improves performance significantly on TW (by 800% on firefox, 30% on chrome)
preferred-branch-method = "jump-table"
# TW can benefit from hinting types using extra blocks. For example, (var + 0) > 3
# is faster than var > 3 because types can be checked at runtime, not compile time
compiler-type-hints = true
# Lowest crash so far had counter ~2200
# Reduce this if crashes occur
max-branch-recursion = 2000
preferred-branch-recursion = 2000

[perf]
source = "https://github.com/Classfied3D/turbowarp-perf"
scale = "Time (ms) per 100,000,000 runs (Firefox, JIT disabled)"

# Looks
